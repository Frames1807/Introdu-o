<!DOCTYPE html>  <!-- avisa pro navegador "isso é HTML, mais atual, vs 5" , então ele passa a interpretar dessa forma-->

<!-- Raiz do documento, todo o conteúdo será estruturado entre o comando html, um comando por pág  -->

<html lang="pt-br"> <!-- lang = language. Esse comando indica o comando principal da pág -->

<head>  <!-- O head/cabeça do site, serve para guardar informações sobre a pág, sendo a area de configuração do site. -->
    <meta charset="UTF-8"> <!-- charset/conjunto de caracteres, chamado de UTF-8. Esse comando garante a interpretação de caracteres, aceitando acentos e etc. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Isso faz o site se adaptar ao tamanho da tela -->
    <title>Document</title> <!-- Ponto de informação, serve para se comunicar com o navegador, informa a ele o título do nosso site, para facilitar na busca do usuário. Detalhe, o usuário não consegue interagir com esse comando, pois, ele faz parte do head. -->
</head>

<body> <!-- Body/corpo é a parte do html onde fica todo o conteúdo visivel do site. -->
    
</body>

</html>
