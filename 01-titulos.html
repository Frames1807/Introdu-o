<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conhecendo Tags de Títulos</title>
</head>
<body>
    <!-- Temos 6 níveis de título, h1 até h6 -->
  <!-- <h1> - representa a abertura da tag -->
  <!-- </h1> - representa o fechamento da tag -->

  <h1>Este é um título de nível 1</h1>  <!-- O ideal é usar somente um unico h1 por pág, ex: Existem dois titulos (ou +) principais em um unico livro? -->
  <h2>Este é um título de nível 2</h2>
  <h3>Este é um título de nível 3</h3> 
  <h4>Este é um título de nível 4</h4>
  <h5>Este é um título de nível 5</h5>
  <h6>Este é um título de nível 6</h6>






</body>
</html>
